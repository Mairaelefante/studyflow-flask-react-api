<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>AI Task Dashboard</title><link rel="stylesheet" href="styles.css"/></head><body><main class="container"><header><h1>AI Task Dashboard</h1><p>Track evaluation, coding, and ML portfolio tasks.</p></header><section class="controls"><input id="searchInput" type="search" placeholder="Search tasks..."/><select id="priorityFilter"><option value="all">All priorities</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select><button id="sortButton">Sort by Priority</button></section><section class="new-task"><input id="taskTitle" type="text" placeholder="New task title"/><select id="taskPriority"><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select><button id="addTaskButton">Add Task</button></section><section id="taskList" class="task-grid"></section></main><script src="script.js"></script></body></html>
